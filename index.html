<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODS Executive Portal</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
  display:flex;
  justify-content:center;
  padding:40px 15px;
}

.container{
  width:100%;
  max-width:520px;
}

.header{
  text-align:center;
  margin-bottom:30px;
}

.logo{
  width:120px;
  margin-bottom:15px;
}

h1{
  font-size:20px;
  font-weight:600;
  letter-spacing:1px;
}

/* BUTTON STYLE */
.dropdown-btn{
  width:100%;
  padding:14px 16px;
  margin:8px 0;
  background:#1e293b;
  border:none;
  border-radius:12px;
  color:white;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:all 0.3s ease;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.dropdown-btn:hover{
  background:#2563eb;
  transform:translateY(-2px);
}

.dropdown-btn i{
  margin-right:8px;
}

.arrow{
  transition:transform 0.3s ease;
}

.rotate{
  transform:rotate(180deg);
}

/* CONTENT */
.dropdown-content{
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:max-height 0.5s ease, opacity 0.4s ease;
  margin-left:15px;
}

.dropdown-content.show{
  max-height:2000px;
  opacity:1;
}

.dropdown-content a{
  display:block;
  padding:10px 14px;
  margin:6px 0;
  background:#111827;
  border-radius:8px;
  text-decoration:none;
  color:#cbd5e1;
  font-size:14px;
  transition:all 0.3s ease;
}

.dropdown-content a:hover{
  background:#2563eb;
  color:white;
  transform:translateX(5px);
}

@media(max-width:480px){
  .container{
    max-width:100%;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <!-- GANTI LOGO DI SINI -->
  <img src="https://upload.wikimedia.org/wikipedia/commons/9/97/Logo_PLN.png" class="logo">
  <h1>ODS EXECUTIVE PORTAL</h1>
</div>

<!-- KINERJA 2025 -->
<button class="dropdown-btn" onclick="toggleDropdown(this)">
  <span><i class="fa-solid fa-chart-line"></i> Kinerja ODS 2025</span>
  <span class="arrow"><i class="fa-solid fa-chevron-down"></i></span>
</button>
<div class="dropdown-content">
  <a href="#"><i class="fa-solid fa-gauge"></i> Dashboard UP3</a>
  <a href="#"><i class="fa-solid fa-gauge-high"></i> Dashboard ULP</a>
  <a href="#"><i class="fa-solid fa-database"></i> Monitoring Aset</a>
</div>

<!-- KINERJA 2026 -->
<button class="dropdown-btn" onclick="toggleDropdown(this)">
  <span><i class="fa-solid fa-chart-simple"></i> Kinerja ODS 2026</span>
  <span class="arrow"><i class="fa-solid fa-chevron-down"></i></span>
</button>
<div class="dropdown-content">
  <a href="#"><i class="fa-solid fa-gauge"></i> Dashboard UP3 2026</a>
  <a href="#"><i class="fa-solid fa-gauge-high"></i> Dashboard ULP 2026</a>
</div>

<!-- AGENDA KHUSUS -->
<button class="dropdown-btn" onclick="toggleDropdown(this)">
  <span><i class="fa-solid fa-folder-open"></i> Agenda Khusus ODS</span>
  <span class="arrow"><i class="fa-solid fa-chevron-down"></i></span>
</button>

<div class="dropdown-content">

  <!-- INFORMASI TERBARU -->
  <button class="dropdown-btn" onclick="toggleDropdown(this)">
    <span><i class="fa-solid fa-bolt"></i> Informasi Terbaru</span>
    <span class="arrow"><i class="fa-solid fa-chevron-down"></i></span>
  </button>
  <div class="dropdown-content">
    <a href="#">Update Program PLTS</a>
    <a href="#">Update BESS</a>
  </div>

  <!-- LISDES ABT -->
  <button class="dropdown-btn" onclick="toggleDropdown(this)">
    <span><i class="fa-solid fa-lightbulb"></i> LISDES ABT</span>
    <span class="arrow"><i class="fa-solid fa-chevron-down"></i></span>
  </button>
  <div class="dropdown-content">
    <a href="#">Paparan Monev & Action Plan</a>
    <a href="#">Laporan ABT 2025</a>
  </div>

  <!-- DEMAND CREATION -->
  <button class="dropdown-btn" onclick="toggleDropdown(this)">
    <span><i class="fa-solid fa-solar-panel"></i> Demand Creation</span>
    <span class="arrow"><i class="fa-solid fa-chevron-down"></i></span>
  </button>
  <div class="dropdown-content">
    <a href="#">Potensi PLTS DIT DIST</a>
    <a href="#">Analisis Spasial Sumkal</a>
    <a href="#">GSheet PLTS & BESS</a>
    <a href="#">Tagging Interkoneksi</a>
  </div>

</div>

</div>

<script>
function toggleDropdown(button){
  const content = button.nextElementSibling;
  const arrow = button.querySelector(".arrow");

  if(content){
    content.classList.toggle("show");
  }

  if(arrow){
    arrow.classList.toggle("rotate");
  }
}
</script>

</body>
</html>
